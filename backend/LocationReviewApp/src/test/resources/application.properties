# Test configuration — overrides src/main/resources/application.properties for all tests

# H2 in-memory DB — no real PostgreSQL connection needed for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Skip Hibernate DDL — H2 doesn't support PostGIS geography type.
# The users table is created by schema.sql instead.
spring.jpa.hibernate.ddl-auto=none

# Dummy Azure Entra values — real connections are mocked out via @MockBean in each test
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://fake.ciamlogin.com/fake/v2.0
azure.entra.client-id=fake-client-id

# Dummy Azure Blob values — real connections are mocked out via @MockBean in each test
azure.storage.connection-string=fake
azure.storage.container-name=fake
